name: sonar-scanner

on:
  push: 
      branches: 
        - develop  

jobs:
  SonarScanner:
    if: github.repository == 'Pr-Mex/vanessa-automation'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Вычисление имени ветки
      uses: nelonoel/branch-name@v1.0.1
    
    - name: Извлечение версии
      shell: bash
      run: echo "##[set-output name=version;]` cat ./VanessaAutomation/Ext/ObjectModule.bsl | grep -oP '(?<=Версия \= ").[\d|.]*'`"
      id: extract_version

    - name: Настройка sonar-scanner
      uses: warchant/setup-sonar-scanner@v9

    - name: SonarCloud Scan on push
      if:  github.event_name == 'push'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: sonar-scanner
        -Dsonar.host.url=https://sonar.openbsl.ru
        -Dsonar.branch.name=${{ env.BRANCH_NAME }}
        -Dsonar.projectVersion=${{ steps.extract_version.outputs.version }}
          
